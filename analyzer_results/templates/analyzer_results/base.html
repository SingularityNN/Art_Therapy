<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        {% block title %}
        {% endblock %}
    </title>

    <style>
        * {
            font-family: sans-serif;
        }

        a {
            color: black;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: #011e91;
        }

        .links {
            display: flex;
            font-size: 20px;
            align-items: center;
            justify-content: space-around;
            margin-top: 50px;
        }

    </style>

</head>
<body>

    {% block urls %}
        <div class="links">
            <a href="{% url 'analyzer_results:start_page' %}">Стартовая страница</a>
            <a href="{% url 'analyzer_results:show_res' %}">Показать результат анализа</a>
            <a href="{% url 'analyzer_results:input_path' %}">Загрузить другую картинку</a>
        </div>
    {% endblock %}

    {% block body %}
    {% endblock %}
</body>
</html>
