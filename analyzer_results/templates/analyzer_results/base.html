<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        {% block title %}
        {% endblock %}
    </title>

    <link rel="stylesheet" href="{% static 'bootstrap/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'analyzer_results/styles.css' %}">



</head>
<body>

    {% block urls %}
        <header>
            <div class="links-container gap-3">
                <a class="btn btn-outline-secondary" href="{% url 'analyzer_results:start_page' %}" role="button">Стартовая страница</a>
                <a class="btn btn-outline-secondary" href="{% url 'analyzer_results:experiments_list' %}" role="button">Показать все записи</a>
                <a class="btn btn-outline-secondary" href="{% url 'analyzer_results:add_experiment' %}" role="button">Добавить эксперимент</a>
            </div>

            <div class="admin-tab-container gap-3">
                <a class="btn btn-outline-danger" href="{% url 'admin:index' %}" role="button">Панель админа</a>
            </div>
        </header>
    {% endblock %}

    {% block body %}
    {% endblock %}
</body>
</html>
